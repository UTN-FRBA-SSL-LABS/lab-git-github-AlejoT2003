name: Verificar Lab Git

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verificar:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: C9. Branch feature/mi-funcion fue creada
        run: |
          git fetch --all --quiet
          if git branch -a | grep -q 'feature/mi-funcion'; then
            echo "PASS: branch feature/mi-funcion encontrada"
          else
            MERGED=$(gh pr list --state merged --json headRefName --jq '[.[].headRefName] | map(select(. == "feature/mi-funcion")) | length')
            if [ "$MERGED" -gt 0 ]; then
              echo "PASS: feature/mi-funcion fue mergeada via PR"
            else
              echo "FAIL: branch feature/mi-funcion no encontrada"
              exit 1
            fi
          fi

      - name: C10. PR de feature/mi-funcion a main fue mergeado
        run: |
          COUNT=$(gh pr list --state merged --base main --json headRefName \
            --jq '[.[].headRefName] | map(select(. == "feature/mi-funcion")) | length')
          if [ "$COUNT" -gt 0 ]; then
            echo "PASS: PR de feature/mi-funcion mergeado"
          else
            echo "FAIL: no se encontro PR mergeado de feature/mi-funcion"
            exit 1
          fi

      - name: C11. Branch sugerencia/* fue creada
        run: |
          git fetch --all --quiet
          if git branch -a | grep -q 'sugerencia/'; then
            echo "PASS: branch sugerencia/* encontrada"
          else
            COUNT=$(gh pr list --state all --json headRefName \
              --jq '[.[].headRefName] | map(select(startswith("sugerencia/"))) | length')
            if [ "$COUNT" -gt 0 ]; then
              echo "PASS: sugerencia/* encontrada en PRs"
            else
              echo "FAIL: no se encontro branch sugerencia/*"
              exit 1
            fi
          fi

      - name: C12. PR de sugerencia/* fue mergeado
        run: |
          COUNT=$(gh pr list --state merged --base main --json headRefName \
            --jq '[.[].headRefName] | map(select(startswith("sugerencia/"))) | length')
          if [ "$COUNT" -gt 0 ]; then
            echo "PASS: PR de sugerencia/* mergeado"
          else
            echo "FAIL: no se encontro PR mergeado de sugerencia/*"
            exit 1
          fi

      - name: C13. PR de sugerencia/* tiene al menos un review
        run: |
          PR_NUMBER=$(gh pr list --state merged --base main --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("sugerencia/")) | .number' | head -1)
          if [ -z "$PR_NUMBER" ]; then
            echo "FAIL: no se encontro PR de sugerencia/*"
            exit 1
          fi
          REVIEW_COUNT=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews" \
            --jq 'length')
          if [ "$REVIEW_COUNT" -gt 0 ]; then
            echo "PASS: PR #${PR_NUMBER} tiene ${REVIEW_COUNT} review(s)"
          else
            echo "FAIL: PR #${PR_NUMBER} no tiene reviews"
            exit 1
          fi

      - name: C14. PR de sugerencia/* fue aprobado
        run: |
          PR_NUMBER=$(gh pr list --state merged --base main --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("sugerencia/")) | .number' | head -1)
          APPROVED=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews" \
            --jq '[.[] | select(.state == "APPROVED")] | length')
          if [ "$APPROVED" -gt 0 ]; then
            echo "PASS: PR aprobado"
          else
            echo "FAIL: PR no fue aprobado (falta Approve en el review)"
            exit 1
          fi
